<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#fdf5e0; --ink1:#2c2017; --ink2:#5c4a3a; --ink3:#8a7460;
    --card:#fffaf0; --terra:#c46a4a; --saffron:#d99a3c; --sage:#7ba05b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:Inter,system-ui,sans-serif}
  .card{position:relative;width:1200px;height:630px;overflow:hidden}
  .bg{position:absolute;inset:0;background:url('assets/heroimage.jpg') center/cover no-repeat}
  .scrim{position:absolute;inset:0;background:
     linear-gradient(105deg, rgba(36,24,14,.88) 0%, rgba(36,24,14,.62) 40%, rgba(36,24,14,.18) 72%, rgba(36,24,14,.05) 100%)}
  .wrap{position:relative;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 78px;gap:48px}

  /* Left: brand + badge */
  .left{display:flex;flex-direction:column;gap:26px;max-width:560px;color:var(--cream)}
  .brand{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:112px;line-height:.92;letter-spacing:-3px;color:var(--cream)}
  .tag{font-size:30px;font-weight:450;line-height:1.32;color:rgba(253,245,224,.94);letter-spacing:-.2px}
  .tag b{font-weight:600;color:#f4c98a}

  .badge{display:inline-flex;align-items:center;gap:13px;background:#000;border:1px solid rgba(255,255,255,.28);
     border-radius:14px;padding:12px 20px 12px 18px;width:max-content;box-shadow:0 8px 26px rgba(0,0,0,.32)}
  .badge svg{width:30px;height:30px;fill:#fff}
  .badge .bt{display:flex;flex-direction:column;line-height:1.05;color:#fff;font-family:Inter,sans-serif}
  .badge .bt small{font-size:13px;font-weight:400;letter-spacing:.2px}
  .badge .bt span{font-size:25px;font-weight:600;letter-spacing:-.3px;margin-top:1px}

  /* Right: Concierge phone showing the morning brief */
  /* iPhone proportions: ~9:19.5 (262 x 566 ≈ 0.463) */
  .phone{position:relative;width:262px;height:566px;border-radius:50px;background:#241810;
     padding:10px;box-shadow:0 30px 70px rgba(20,12,4,.55), inset 0 0 0 2px rgba(255,255,255,.06)}
  .screen{position:relative;height:100%;border-radius:42px;overflow:hidden;
     background:linear-gradient(180deg,#fffaf0 0%, #fdf2dc 100%);padding:24px 19px 18px}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:82px;height:25px;
     background:#0e0a06;border-radius:14px;z-index:6}
  .sb{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--ink3);margin-bottom:15px}
  .ey{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--saffron);
     text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
  .ey svg{width:15px;height:15px;stroke:var(--saffron);fill:none;stroke-width:2}
  .greet{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:25px;line-height:1.1;color:var(--ink1);margin-bottom:13px;letter-spacing:-.5px}
  .brief p{font-size:14px;line-height:1.46;color:var(--ink2);margin-bottom:10px}
  .brief b{color:var(--ink1);font-weight:600}
  .composer{position:absolute;left:19px;right:19px;bottom:18px;display:flex;align-items:center;justify-content:space-between;
     background:#fff;border:1px solid rgba(44,32,23,.1);border-radius:26px;padding:11px 11px 11px 16px;
     font-size:13.5px;color:var(--ink3);box-shadow:0 6px 18px rgba(44,32,23,.08)}
  .composer .send{display:flex;align-items:center;justify-content:center;width:31px;height:31px;border-radius:50%;
     background:var(--terra)}
  .composer .send svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.4}
  .screen.shot{padding:0}
  .screen.shot img{display:block;width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
  <div class="card">
    <div class="bg"></div>
    <div class="scrim"></div>
    <div class="wrap">
      <div class="left">
        <div class="brand">Kinrows</div>
        <div class="tag">Family life, moving together — with a <b>Concierge</b> that runs the app for you.</div>
        <div class="badge">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.05 12.04c-.03-2.6 2.13-3.84 2.22-3.9-1.21-1.78-3.1-2.02-3.78-2.04-1.6-.16-3.13.94-3.94.94-.81 0-2.06-.92-3.4-.9-1.74.03-3.35 1.02-4.25 2.58-1.82 3.16-.47 7.83 1.3 10.4.86 1.25 1.89 2.66 3.24 2.61 1.3-.05 1.79-.84 3.36-.84 1.57 0 2.01.84 3.39.81 1.4-.02 2.28-1.27 3.14-2.53.99-1.46 1.4-2.87 1.42-2.94-.03-.02-2.72-1.05-2.75-4.13Z"/><path d="M14.6 4.5c.72-.87 1.2-2.08 1.07-3.28-1.03.04-2.28.69-3.02 1.56-.66.77-1.24 2-1.08 3.18 1.15.09 2.32-.59 3.03-1.46Z"/></svg>
          <div class="bt"><small>Coming this fall to the</small><span>App Store</span></div>
        </div>
      </div>
      <div class="phone">
        <div class="screen shot">
          <img src="assets/shots/home.png" alt="Kinrows app home screen">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
