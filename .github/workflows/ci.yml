name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests (auth + household isolation)
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Runtime dependency advisories. Known residual: build-time sqlite3/node-gyp
      # (tar) and the imap cron chain (utf7/semver) are not server-reachable.
      - name: npm audit (high+)
        run: npm audit --audit-level=high --omit=dev || true
