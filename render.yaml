services:
  - type: web
    name: family-life-organizer
    env: node
    buildCommand: npm install
    startCommand: node dashboard.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RENDER_DISK_PATH
        value: /opt/render/project/src/vault/family-life
      - key: TZ
        value: America/Halifax
      # Secrets — set these in the Render dashboard, never commit values here.
      - key: SESSION_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: family-data
      mountPath: /opt/render/project/src/vault/family-life
      sizeGB: 1
